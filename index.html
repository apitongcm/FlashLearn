<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashLearn by Carl Marwin Apitong</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5; 
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Top Action Bar Grouping */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--text-main);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.15);
            transition: all 0.2s ease;
        }
        .btn:hover { 
            background-color: var(--accent); 
            transform: translateY(-1px);
        }
        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background-color: #cbd5e1;
        }
        #csv-file { display: none; }

        /* --- 3D Flashcard Architecture (Optimized for Landscape) --- */
        .card {
            width: 100%;
            height: 60vh; /* Scaled down relative to window height for tight landscape boundaries */
            max-height: 320px;
            min-height: 240px;
            perspective: 1200px; 
            background: transparent;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(241, 245, 249, 0.8);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Typography Auto-scalers */
        .character {
            font-size: 12vh; /* Scale with screen real-estate height */
            max-size: 80px;
            font-weight: 700;
            color: var(--text-main);
        }

        .pinyin {
            font-size: 5vh;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .english {
            font-size: 4vh;
            font-weight: 400;
            color: var(--text-muted);
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .instructions {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 16px;
            line-height: 1.4;
        }

        /* --- Smart Mobile Portrait Blocker Overlay --- */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--text-main);
            color: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #orientation-overlay svg {
            width: 64px;
            height: 64px;
            fill: white;
            margin-bottom: 20px;
            animation: rotateHint 2s infinite ease-in-out;
        }

        @keyframes rotateHint {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        /* Detect Mobile Devices in Portrait View */
        @media (max-width: 900px) and (orientation: portrait) {
            #orientation-overlay {
                display: flex;
            }
        }
    </style>
</head>
<body>

<div id="orientation-overlay">
    <svg viewBox="0 0 24 24">
        <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5v14z"/>
    </svg>
    <h2>Please Rotate Your Device</h2>
    <p style="color: var(--text-muted)">This application is optimized for landscape mode view.</p>
</div>

<div class="container">
    <div class="action-bar">
        <label for="csv-file" class="btn">Upload CSV</label>
        <input type="file" id="csv-file" accept=".csv">
        <button id="fullscreen-btn" class="btn btn-secondary">Fullscreen ⛶</button>
    </div>

    <div id="flashcard" class="card">
        <div id="card-content" class="card-front">
            <p class="placeholder-text">Please upload a CSV file to start.</p>
        </div>
    </div>

    <p class="instructions">
        <strong>Double-click</strong> to flip. <strong>Swipe Left</strong> (or <strong>Spacebar</strong>) for next card.
    </p>
</div>

<script>
    let flashcards = [];
    let currentCard = null;

    const csvFileInput = document.getElementById('csv-file');
    const cardElement = document.getElementById('flashcard');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    // --- 1. Fullscreen Engine & Orientation Blocker API Lock ---
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                // Safely attempt hardware layout lock if browser engine architecture supports it
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {
                        // Silent fallback if browser limits auto-locking mechanics
                    });
                }
            }).catch(err => {
                alert(`Error entering fullscreen mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    });

    // --- 2. Parse CSV File ---
    csvFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const lines = text.split('\n');
            flashcards = []; 

            lines.forEach(line => {
                const columns = line.split(',');
                if (columns.length >= 3) {
                    flashcards.push({
                        character: columns[0].trim(),
                        pinyin: columns[1].trim(),
                        english: columns[2].trim()
                    });
                }
            });

            if (flashcards.length > 0) {
                showNextCard();
            } else {
                alert("No valid data found in CSV. Format should be: Character,Pinyin,English");
            }
        };
        reader.readAsText(file);
    });

    // --- 3. Card Management Engine ---
    function showNextCard() {
        if (flashcards.length === 0) return;
        
        const randomIndex = Math.floor(Math.random() * flashcards.length);
        currentCard = flashcards[randomIndex];

        cardElement.classList.remove('flipped');

        cardElement.innerHTML = `
            <div class="card-inner">
                <div class="card-front">
                    <div class="character">${currentCard.character}</div>
                </div>
                <div class="card-back">
                    <div class="pinyin">${currentCard.pinyin}</div>
                    <div class="english">${currentCard.english}</div>
                </div>
            </div>
        `;
    }

    function revealCard() {
        if (currentCard) {
            cardElement.classList.toggle('flipped'); 
        }
    }

    // --- 4. Gesture & Interaction Listeners ---
    cardElement.addEventListener('dblclick', () => {
        revealCard();
    });

    let touchstartX = 0;
    let touchendX = 0;

    cardElement.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    }, {passive: true});

    cardElement.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleSwipeGesture();
    }, {passive: true});

    function handleSwipeGesture() {
        if (touchendX < touchstartX - 50) {
            showNextCard();
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === "Space") {
            e.preventDefault(); 
            showNextCard();
        }
    });
</script>

</body>
</html>
