<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlashLearn by Ma WeiEn</title>
     <link
        rel="icon"
        type="image/png"
        href="icon.png"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="orientation-overlay">
        <svg viewBox="0 0 24 24">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3.25-3H6.75V4h10.5v14z"/>
        </svg>
        <h2>Please Rotate Your Device</h2>
        <p class="overlay-sub">This application is optimized for landscape mode view.</p>
    </div>

    <div class="container">
        <div class="action-bar">
            <label tensor-id="upload" for="csv-file" class="btn">Upload CSV</label>
            <input type="file" id="csv-file" accept=".csv">
            <button id="fullscreen-btn" class="btn btn-secondary">Fullscreen ⛶</button>
            <!--Added a reset button to clear cache and load again the default.csv 06062026-->
            <button id="reset-btn" class="btn btn-secondary" style="background-color: #fee2e2; color: #991b1b;">Reset ↺</button>
        </div>

        <div id="flashcard" class="card">
            <div id="card-content" class="card-front">
                <p class="placeholder-text">Please upload a CSV file to start.</p>
            </div>
        </div>

        <p class="instructions">
            <strong>Double-click</strong> to flip. <strong>Swipe Left</strong> (or <strong>Spacebar</strong>) for next card.
            <br>
            <br>
            <strong>By Ma WeiEn. </strong>
        </p>
    </div>

    <script src="index.js"></script>
</body>
</html>
